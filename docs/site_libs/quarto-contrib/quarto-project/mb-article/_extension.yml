title: mb-article
author: Melanie Bacou
version: 1.3.3
quarto-required: ">=1.8.0"
contributes:
  formats:
    html:
      smooth-scroll: true
      date-format: medium
      link-external-icon: false
      link-external-newwindow: true

      tbl-cap-location: bottom
      fig-cap-location: bottom
      reference-location: margin
      citation-location: margin
      citations-hover: true
      footnotes-hover: false
      bibliography: references.bib
      
      abstract-title: Abstract
      description-title: Summary
      appendix-style: default
      appendix-cite-as: bibtex

      fig-dpi: 120
      fig-format: png

      code-copy: false
      code-overflow: wrap
      code-annotations: hover
      search:
        show-item-context: true

      toc: true
      toc-depth: 3
      toc-expand: true
      toc-location: left
      toc-title: Contents  

      title-block-banner: true
      template-partials:
        - navbar.html
        - title-block.html
        - title-meta-author.html
      theme:
        light:
          - defaults.scss
          - rules.scss
          - brand      

      fontsize: 15px
      grid:
        body-width: 720px
        sidebar-width: 180px
        margin-width: 210px
        gutter-width: 1rem

      logo: logo.png
      logo-href: ./    

      tools: 
        - icon: github
          href: https://github.com/mbacou/mb-article
        - icon: telegram
          href: https://t.me/mbacou
        - icon: linkedin
          href: https://linkedin.com/in/mbacou
      
      links:
        - text: Link 1
          icon: link
          href: ./
        - text: Link 2
          icon: link
          href: ./
        - text: Link 3
          icon: link
          href: ./         

      
        



