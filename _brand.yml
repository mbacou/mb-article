meta:
  name: Mel B. Labs
  logo: assets/mb-square.svg
  link:
    home: https://mbacou.github.io/mb-labs
    github: https://github.com/mbacou/mb-labs

color:
  palette:
    teal:      "#8E8467"
    indigo:    "#79799C"
    blue:      "#00839E"
    cyan:      "#05D5FF"
    green:     "#73842A"
    purple:    "#8D46C1"
    pink:      "#C6A5E8"
    brick:     "#D47979"
    red:       "#B54D4D"
    orange:    "#A1713C"
    yellow:    "#E0D1A4"
    gray:      "#4d4d4d"
    light:     "#FCFAF5"
    dark:      "#003946"
    grid:      "#e7e2da"

  foreground:  gray     # gray is BS gray-800 in this template
  background:  light
  primary:     brick
  secondary:   purple
  tertiary:    gray
  info:        blue
  success:     green
  warning:     orange
  danger:      red
  light:       light
  dark:        dark

typography:
  fonts:
    - family: Crimson Text
      source: google
      weight: [400, 500, 600]
    - family: Iosevka Charon Mono
      source: google
      weight: [400, 500]
    - family: Caveat
      source: google
      weight: [400]

  base: 
    family: Crimson Text
    size: 20px
  headings: Caveat
  monospace: 
    family: Iosevka Charon Mono
    size: 14px
  
 

