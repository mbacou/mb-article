title: mb-article
author: Melanie Bacou
version: 1.4.5
quarto-required: ">=1.8.0"
contributes:
  formats:
    html:
      smooth-scroll: true
      date-format: medium
      link-external-icon: false
      link-external-newwindow: true

      tbl-cap-location: bottom
      fig-cap-location: bottom
      citation: true
      citation-location: document
      reference-location: margin
      citations-hover: true
      footnotes-hover: false
      
      abstract-title: Abstract
      description-title: Summary
      appendix-style: plain

      fig-dpi: 120
      fig-format: svg

      code-copy: false
      code-overflow: wrap
      code-annotations: hover
      search:
        show-item-context: true

      toc: true
      toc-depth: 3
      toc-expand: true
      toc-location: left
      toc-title: Content

      format-resources:
        - _brand.yml
        - mb-logo.png
        - mb-banner.avif
        - logo.svg
        - banner.svg
        - biblio.bib  

      template-partials:
        - header.html
        - title-block.html
        - title-meta-author.html
        - toc.html
      theme:
        light:
          - defaults.scss
          - rules.scss
          - brand      

      fontsize: 15px
      grid:
        body-width: 700px
        sidebar-width: 200px
        margin-width: 210px
        gutter-width: 2rem

      copyright: 2026
      license: CC BY-NC 4.0

      # format extras
      logo: logo.svg
      logo-href: ./
      footer: |
        <strong>Mel B. Labs</strong> -- a personal blog about statistics
        and spatial econometrics.      
      header:
        palette: true
        right: 
          - icon: github
            href: https://github.com/mbacou/mb-article
          - icon: telegram
            href: https://t.me/mbacou
          - icon: linkedin
            href: https://linkedin.com/in/mbacou
          - icon: youtube
            href: https://youtube.com/\@mbacou/playlists
        left:
          - text: Link 1
            icon: link
            href: ./
          - text: Link 2
            icon: link
            href: ./
          - text: Link 3
            icon: link
            href: ./         

      
        



